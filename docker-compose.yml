version: '3.8'

services:
  backend:
    build:
      context: ./be
      dockerfile: Dockerfile
    image: resonance-ai-backend
    ports:
      - "8080:8080"
    env_file:
      - ./be/.env
    restart: unless-stopped
    networks:
      - app-network

  frontend:
    build:
      context: ./fe
      dockerfile: Dockerfile
    image: resonance-ai-frontend
    ports:
      - "80:80"
    # Ensure backend starts before frontend
    depends_on:
      - backend
    restart: unless-stopped
    networks:
      - app-network

networks:
  app-network:
    driver: bridge
