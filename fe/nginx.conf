server {
    listen 80;
    server_name localhost;

    root /usr/share/nginx/html;
    index index.html;

    # Important for Single Page Applications (SPA) like React/Vite.
    # This tells Nginx to route all requests back to index.html instead of showing a 404 error when a user refreshes the page.
    location / {
        try_files $uri $uri/ /index.html;
    }

    # Optional: Cache static assets (images, CSS, JS) for better performance
    location ~* \.(?:ico|css|js|gif|jpe?g|png|woff2?|eot|ttf|svg)$ {
        expires 6M;
        access_log off;
        add_header Cache-Control "public, max-age=15552000, immutable";
    }
}
